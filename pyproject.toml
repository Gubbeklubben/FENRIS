[project]
name = "fedbench"
version = "0.1.0"
description = "An Extensible Benchmarking Framework for Federated Synthetic Tabular Data Generators"
authors = [
    {name = "Trond Thorsteinsson", email = "trondthorsteinsson@gmail.com"},
    {name = "Alexander Rød Opedal", email = "alexander@opedal.org"},
    {name = "Bård Linga", email = "bardlinga@gmail.com"},
    {name = "Ken Solbakken Remen", email = "kenremen@gmail.com"},
    {name = "Thomas Stavik Lønning", email = "loenning1995@gmail.com"},
]
license = "MIT"
requires-python = ">=3.12,<3.14"

dependencies = [
    "flwr[simulation] (>=1.25.0,<2.0.0)",
    "typer (>=0.12.5,<0.21.0)",
    "numpy (>=2.4.2,<3.0.0)",
    "pandas (>=3.0.0,<4.0.0)",
    "flwr-datasets (>=0.6.0,<0.7.0)",
    "datasets (>=4.5.0,<5.0.0)",
    "scipy (>=1.17.0,<2.0.0)",
    "scikit-learn (>=1.8.0,<2.0.0)"
]

[dependency-groups]
dev = [
    "mypy (>=1.19.1,<2.0.0)",
    "pytest (>=9.0.2,<10.0.0)",
    "pytest-cov (>=6.0.0,<7.0.0)",
    "scipy-stubs (>=1.17.0.2,<2.0.0.0)",
    "pandas-stubs (>=3.0.0.260204,<4.0.0.0)",
    "ruff (>=0.9.0)",
    "pre-commit (>=4.5.1,<5.0.0)",
]
builtins = [
    "torch (>=2.10.0,<3.0.0)"
]

[project.scripts]
fedbench = "fedbench.__main__:app"

[project.entry-points."fedbench.synthesizers"]
fed_hello     = "fedbench.builtins.synthesizers.fed_hello:FedHello"
fed_naughty   = "fedbench.builtins.synthesizers.fed_naughty:FedNaughty"
fedtabdiff    = "fedbench.builtins.synthesizers.fedtabdiff:FedTabDiff"
fed_tgan      = "fedbench.builtins.synthesizers.fed_tgan:FedTGAN"
fed_simplegan = "fedbench.builtins.synthesizers.fed_simplegan:FedSimpleGAN"

[project.entry-points."fedbench.coordinators"]
fedavg = "fedbench.builtins.coordinators.fedavg:FedAvg"
fed_tgan = "fedbench.builtins.coordinators.fed_tgan:FedTGAN"

[project.entry-points."fedbench.evaluators"]
moment_reduction_metrics        = "fedbench.builtins.evaluators.fidelity:MomentReductionMetricsEvaluator"
distribution_similarity_metrics = "fedbench.builtins.evaluators.fidelity:DistributionSimilarityMetricsEvaluator"
categorical_tv_mean             = "fedbench.builtins.evaluators.fidelity:CategoricalTvMeanEvaluator"
corr_fro_diff                   = "fedbench.builtins.evaluators.fidelity:CorrFroDiffEvaluator"

tstr                        = "fedbench.builtins.evaluators.utility:TSTREvaluator"
direct_overlap_diagnostic   = "fedbench.builtins.evaluators.privacy:DirectOverlapDiagnosticEvaluator"
mia_nearest_neighbor_attack = "fedbench.builtins.evaluators.privacy:MIANearestNeighborAttackEvaluator"
aia_supervised_attack       = "fedbench.builtins.evaluators.privacy:AIASupervisedAttackEvaluator"

fairness    = "fedbench.builtins.evaluators.fairness:FairnessEvaluator"
scalability = "fedbench.builtins.evaluators.scalability:ScalabilityEvaluator"

[project.entry-points."fedbench.partitioners"]
iid_partitioner          = "fedbench.builtins.partitioners.flwr_delegates:FlwrDelegatePartitioner.with_iid_partitioner"
linear_partitioner       = "fedbench.builtins.partitioners.flwr_delegates:FlwrDelegatePartitioner.with_linear_partitioner"
square_partitioner       = "fedbench.builtins.partitioners.flwr_delegates:FlwrDelegatePartitioner.with_square_partitioner"
exponential_partitioner  = "fedbench.builtins.partitioners.flwr_delegates:FlwrDelegatePartitioner.with_exponential_partitioner"
dirichlet_partitioner    = "fedbench.builtins.partitioners.flwr_delegates:FlwrDelegatePartitioner.with_dirichlet_partitioner"
pathological_partitioner = "fedbench.builtins.partitioners.flwr_delegates:FlwrDelegatePartitioner.with_pathological_partitioner"
shard_partitioner        = "fedbench.builtins.partitioners.flwr_delegates:FlwrDelegatePartitioner.with_shard_partitioner"
continuous_partitioner   = "fedbench.builtins.partitioners.flwr_delegates:FlwrDelegatePartitioner.with_continuous_partitioner"


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"


[tool.poetry]
packages = [{include = "fedbench", from = "src"}]

# --- MYPY CONFIG ---

[tool.mypy]
mypy_path = ["src"]
strict = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "torch.*"
follow_imports = "skip"
follow_imports_for_stubs = true

# --- RUFF CONFIG ---

[tool.ruff]
line-length = 88
src = ["src", "tests"]

[tool.ruff.lint]
# E, W: pycodestyle (standard errors and warnings)
# F: pyflakes (unused variables/imports)
# I: isort (automatic import sorting)

# TODO: add along the way to enforce docstrings
# DOC: pydoclint (checks that docstrings match function signatures)
# D: pydocstyle (checks docstring formatting)
select = ["E", "W", "F", "I"]

[tool.ruff.lint.pydocstyle]
convention = "numpy"