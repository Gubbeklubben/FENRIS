name: Publish to PyPI

on:
  release:
    types: [released, prereleased]
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: testpypi
        type: choice
        options: [testpypi, pypi]

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: ${{ inputs.target || (github.event.release.prerelease && 'testpypi' || 'pypi') }}
    permissions:
      id-token: write  # required for PyPI Trusted Publisher (OIDC)
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Build package
        run: poetry build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: ${{ (inputs.target == 'testpypi' || github.event.release.prerelease) && 'https://test.pypi.org/legacy/' || '' }}
