repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        language: system
        entry: ruff check --fix --exit-non-zero-on-fix
        types: [python]
        files: ^(src|tests)/

      - id: ruff-format
        name: ruff format
        language: system
        entry: ruff format
        types: [python]
        files: ^(src|tests)/